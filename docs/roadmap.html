<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PACT — Roadmap Interface</title>
<style>
:root{
  --bg:#f4efe4; --bg2:#efe7d6; --panel:#fbf8f1; --panel2:#f1ead9;
  --ink:#2c2620; --ink2:#6b6153; --line:#ddd1bb; --line2:#e7ddc9;
  --accent:#b5761f; --accent2:#8a5a15; --accentbg:#f6e8cf;
  --now:#c0392b; --next:#b5761f; --later:#7a8a4f; --done:#5b8a72;
  --high:#c0392b; --medium:#c8892a; --low:#7a8a4f;
  --shadow:0 1px 2px rgba(60,45,20,.08),0 3px 12px rgba(60,45,20,.06);
  --radius:12px;
}
:root{
  --bg2:#efe7d6;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#17150f; --bg2:#100e09; --panel:#211d15; --panel2:#2a251b; --ink:#ece4d3;
    --ink2:#a89c85; --line:#3a3327; --line2:#332d22; --accent:#e0a542; --accent2:#f0bd63;
    --accentbg:#2f2716; --now:#e06a5c; --next:#e0a542; --later:#a7bd6f; --done:#79bda0;
    --high:#e06a5c; --medium:#e0b45c; --low:#a7bd6f;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#17150f; --bg2:#100e09; --panel:#211d15; --panel2:#2a251b; --ink:#ece4d3;
  --ink2:#a89c85; --line:#3a3327; --line2:#332d22; --accent:#e0a542; --accent2:#f0bd63;
  --accentbg:#2f2716; --now:#e06a5c; --next:#e0a542; --later:#a7bd6f; --done:#79bda0;
  --high:#e06a5c; --medium:#e0b45c; --low:#a7bd6f;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#f4efe4; --bg2:#efe7d6; --panel:#fbf8f1; --panel2:#f1ead9; --ink:#2c2620;
  --ink2:#6b6153; --line:#ddd1bb; --line2:#e7ddc9; --accent:#b5761f; --accent2:#8a5a15;
  --accentbg:#f6e8cf; --now:#c0392b; --next:#b5761f; --later:#7a8a4f; --done:#5b8a72;
  --high:#c0392b; --medium:#c8892a; --low:#7a8a4f;
  --shadow:0 1px 2px rgba(60,45,20,.08),0 3px 12px rgba(60,45,20,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh;color:var(--ink);
  font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent2)}
.wrap{max-width:1240px;margin:0 auto;padding:18px 18px 80px}

/* Header */
header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 2px 16px}
.brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.crest{width:42px;height:42px;border-radius:11px;flex:0 0 auto;
  background:radial-gradient(circle at 30% 25%,var(--accent),var(--accent2));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px;
  box-shadow:var(--shadow);font-family:Georgia,serif}
.brand h1{font-size:19px;margin:0;font-weight:750;letter-spacing:.2px}
.brand .sub{font-size:12.5px;color:var(--ink2);margin-top:1px}
.iconbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:10px;
  width:38px;height:38px;cursor:pointer;font-size:16px;display:grid;place-items:center}
.iconbtn:hover{border-color:var(--accent)}

/* Stat strip */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:2px 0 18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow)}
.stat .n{font-size:26px;font-weight:780;line-height:1;font-variant-numeric:tabular-nums}
.stat .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink2);margin-top:6px}
.stat.now .n{color:var(--now)} .stat.next .n{color:var(--next)}
.stat.later .n{color:var(--later)} .stat.done .n{color:var(--done)}

/* Controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:11px 12px;box-shadow:var(--shadow);margin-bottom:16px;position:sticky;top:10px;z-index:20}
.search{flex:1 1 200px;min-width:160px;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 11px}
.search input{border:0;background:transparent;color:var(--ink);font-size:14px;outline:none;width:100%}
.search svg{flex:0 0 auto;opacity:.55}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--bg);color:var(--ink2);border-radius:999px;
  padding:5px 12px;font-size:12.5px;cursor:pointer;user-select:none;white-space:nowrap;transition:.12s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accentbg);border-color:var(--accent);color:var(--accent2);font-weight:650}
select.sel{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:9px;
  padding:7px 10px;font-size:13px;cursor:pointer}

/* View tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab{border:1px solid var(--line);background:var(--panel);color:var(--ink2);border-radius:10px;
  padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px}
.tab:hover{border-color:var(--accent)}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow)}
:root[data-theme="dark"] .tab.on,@media(prefers-color-scheme:dark){.tab.on{color:#17150f}}
.tab .ic{font-size:15px}

.count{color:var(--ink2);font-size:12.5px;margin:-6px 2px 14px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--line);
  border-radius:10px;padding:11px 13px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
.card:hover{transform:translateY(-1px);border-left-color:var(--accent)}
.card.s-now{border-left-color:var(--now)} .card.s-next{border-left-color:var(--next)}
.card.s-later{border-left-color:var(--later)} .card.s-done{border-left-color:var(--done)}
.card .ct{font-weight:640;font-size:13.5px;line-height:1.35}
.card .cmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
.badge{font-size:10.5px;font-weight:640;padding:2px 8px;border-radius:999px;letter-spacing:.3px;
  border:1px solid var(--line);color:var(--ink2);background:var(--bg)}
.badge.cat{background:var(--accentbg);border-color:transparent;color:var(--accent2)}
.badge.p-high{color:#fff;background:var(--high);border-color:transparent}
.badge.p-medium{color:#fff;background:var(--medium);border-color:transparent}
.badge.p-low{color:#fff;background:var(--low);border-color:transparent}
:root[data-theme="dark"] .badge.p-high,:root[data-theme="dark"] .badge.p-medium,:root[data-theme="dark"] .badge.p-low{color:#17150f}
@media(prefers-color-scheme:dark){.badge.p-high,.badge.p-medium,.badge.p-low{color:#17150f}}
.badge.dt{font-variant-numeric:tabular-nums}
.card .desc{font-size:12.5px;color:var(--ink2);margin-top:7px;display:none}
.card.exp .desc{display:block}
.card .branch{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--ink2)}

/* Board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
@media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.board{grid-template-columns:1fr}}
.col{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--radius);padding:11px;min-height:80px}
.col h3{margin:2px 4px 11px;font-size:13px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.6px}
.col h3 .dot{width:10px;height:10px;border-radius:50%}
.col h3 .k{margin-left:auto;font-size:12px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);
  border-radius:999px;padding:1px 9px;letter-spacing:0}
.col.c-now .dot{background:var(--now)} .col.c-next .dot{background:var(--next)}
.col.c-later .dot{background:var(--later)} .col.c-done .dot{background:var(--done)}
.col .stack{display:flex;flex-direction:column;gap:9px}
.col .empty{color:var(--ink2);font-size:12.5px;font-style:italic;padding:6px 4px}
.more{text-align:center;font-size:12.5px;color:var(--accent2);cursor:pointer;padding:8px;border:1px dashed var(--line);
  border-radius:9px;margin-top:2px}
.more:hover{border-color:var(--accent)}

/* Timeline */
.timeline{position:relative;padding-left:26px}
.timeline:before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-day{margin-bottom:20px;position:relative}
.tl-day>.d{font-weight:720;font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:9px}
.tl-day>.d:before{content:"";position:absolute;left:-26px;width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:3px solid var(--panel);box-shadow:0 0 0 1px var(--line)}
.tl-day .k{font-size:11.5px;color:var(--ink2);font-weight:500}
.tl-day .stack{display:flex;flex-direction:column;gap:8px}

/* Category / Priority group sections */
.groups{display:flex;flex-direction:column;gap:18px}
.grp{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--radius);padding:13px 14px}
.grp>h3{margin:0 0 12px;font-size:14px;display:flex;align-items:center;gap:9px}
.grp>h3 .k{margin-left:auto;font-size:12px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);
  border-radius:999px;padding:1px 9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

/* Table */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
table{border-collapse:collapse;width:100%;font-size:13px;min-width:640px}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line2);vertical-align:top}
th{background:var(--panel2);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);
  cursor:pointer;position:sticky;top:0;white-space:nowrap}
th:hover{color:var(--accent2)}
tbody tr:hover{background:var(--panel2)}
td .branch{font-family:ui-monospace,monospace;font-size:11px}

/* Dashboard */
.dash{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.dash{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.panel h3{margin:0 0 14px;font-size:14px}
.panel.full{grid-column:1/-1}
.bar-row{display:grid;grid-template-columns:110px 1fr 42px;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
.bar-track{background:var(--bg2);border-radius:6px;height:16px;overflow:hidden;border:1px solid var(--line2)}
.bar-fill{height:100%;border-radius:6px 0 0 6px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar-row .v{text-align:right;color:var(--ink2);font-variant-numeric:tabular-nums}
.spark{display:flex;align-items:flex-end;gap:3px;height:120px;padding-top:8px}
.spark .b{flex:1;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:3px 3px 0 0;min-height:2px;position:relative}
.spark .b:hover:after{content:attr(data-t);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);font-size:10.5px;padding:2px 6px;border-radius:5px;white-space:nowrap;margin-bottom:4px}
.spark-x{display:flex;gap:3px;margin-top:6px}
.spark-x span{flex:1;text-align:center;font-size:9px;color:var(--ink2);transform:rotate(0deg)}

/* Map */
.mapwrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.mapwrap svg{display:block;width:100%;height:auto;touch-action:none}
.map-legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--line2);font-size:12px;color:var(--ink2)}
.map-legend .li{display:flex;align-items:center;gap:6px}
.map-legend .sw{width:12px;height:12px;border-radius:50%}

/* Detail dialog */
dialog.detail{border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--ink);
  max-width:560px;width:92vw;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.35)}
dialog.detail::backdrop{background:rgba(20,15,5,.5)}
.detail .dh{padding:16px 18px;border-bottom:1px solid var(--line2)}
.detail .dh .ct{font-size:16px;font-weight:720;line-height:1.35}
.detail .db{padding:16px 18px;font-size:13.5px;color:var(--ink)}
.detail .db .row{margin-bottom:11px}
.detail .db .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2);margin-bottom:3px}
.detail .df{padding:12px 18px;border-top:1px solid var(--line2);text-align:right}
.detail .df button{border:1px solid var(--line);background:var(--accent);color:#fff;border-radius:9px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}
.hidden{display:none!important}
footer{margin-top:34px;text-align:center;color:var(--ink2);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="crest">P</div>
      <div>
        <h1>PACT — Roadmap</h1>
        <div class="sub">Open work &amp; shipped history · <span id="lastupd"></span></div>
      </div>
    </div>
    <button class="iconbtn" id="themeBtn" title="Toggle light/dark">◐</button>
  </header>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <label class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search titles, categories, branches…" autocomplete="off">
    </label>
    <div class="chips" id="statusChips">
      <span class="chip on" data-status="all">All</span>
      <span class="chip" data-status="open">Open</span>
      <span class="chip" data-status="done">Shipped</span>
    </div>
    <select class="sel" id="catSel"></select>
    <div class="chips" id="prioChips">
      <span class="chip on" data-prio="all">Any priority</span>
      <span class="chip" data-prio="high">High</span>
      <span class="chip" data-prio="medium">Medium</span>
      <span class="chip" data-prio="low">Low</span>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-view="board"><span class="ic">▦</span>Board</button>
    <button class="tab" data-view="timeline"><span class="ic">◷</span>Timeline</button>
    <button class="tab" data-view="category"><span class="ic">☰</span>Category</button>
    <button class="tab" data-view="priority"><span class="ic">▲</span>Priority</button>
    <button class="tab" data-view="map"><span class="ic">◈</span>Map</button>
    <button class="tab" data-view="table"><span class="ic">▤</span>Table</button>
    <button class="tab" data-view="dashboard"><span class="ic">◔</span>Dashboard</button>
  </div>

  <div class="count" id="count"></div>
  <div id="view"></div>

  <footer>Generated from <code>docs/TASK_BOARD.md</code> + <code>CHANGELOG.md</code> · static, vanilla JS, no build step.</footer>
</div>

<dialog class="detail" id="detail">
  <div class="dh"><div class="ct" id="dTitle"></div></div>
  <div class="db" id="dBody"></div>
  <div class="df"><button id="dClose">Close</button></div>
</dialog>

<script>
"use strict";

const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const STATUS_META = {
  now:{label:'Now',cls:'now'}, next:{label:'Next',cls:'next'},
  later:{label:'Later',cls:'later'}, done:{label:'Shipped',cls:'done'}
};
const PRIO_ORDER = {high:0,medium:1,low:2,done:3};

// ---- state ----
let state = { view:'board', q:'', status:'all', cat:'all', prio:'all', expandDone:false };

// ---- setup ----
function init(){
  // last updated = newest done date
  const dates = ITEMS.filter(i=>i.date).map(i=>i.date).sort();
  $('#lastupd').textContent = 'updated ' + (dates[dates.length-1]||'');
  // category select
  const cats = [...new Set(ITEMS.map(i=>i.category))].sort();
  $('#catSel').innerHTML = '<option value="all">All categories</option>' +
    cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  // theme
  const saved = null; // localStorage may be unavailable in some embeds; default to OS
  bindControls();
  renderStats();
  render();
}

function bindControls(){
  $('#q').addEventListener('input',e=>{state.q=e.target.value.toLowerCase().trim();render();});
  $('#statusChips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
    state.status=c.dataset.status;setOn('#statusChips',c);render();});
  $('#prioChips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
    state.prio=c.dataset.prio;setOn('#prioChips',c);render();});
  $('#catSel').addEventListener('change',e=>{state.cat=e.target.value;render();});
  $('#tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
    state.view=t.dataset.view;[...$('#tabs').children].forEach(x=>x.classList.toggle('on',x===t));render();});
  $('#themeBtn').addEventListener('click',toggleTheme);
  $('#dClose').addEventListener('click',()=>$('#detail').close());
  $('#detail').addEventListener('click',e=>{if(e.target.id==='detail')$('#detail').close();});
}
function setOn(sel,el){[...$(sel).children].forEach(x=>x.classList.toggle('on',x===el));}

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const prefersDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const next = cur ? (cur==='dark'?'light':'dark') : (prefersDark?'light':'dark');
  document.documentElement.setAttribute('data-theme',next);
}

// ---- filtering ----
function filtered(){
  return ITEMS.filter(i=>{
    if(state.status==='open' && i.status==='done') return false;
    if(state.status==='done' && i.status!=='done') return false;
    if(state.cat!=='all' && i.category!==state.cat) return false;
    if(state.prio!=='all' && i.priority!==state.prio) return false;
    if(state.q){
      const hay = (i.title+' '+i.category+' '+i.branch+' '+i.scope+' '+i.desc).toLowerCase();
      if(!hay.includes(state.q)) return false;
    }
    return true;
  });
}

function renderStats(){
  const c = k => ITEMS.filter(i=>i.status===k).length;
  const cards = [
    ['now','Now',c('now')],['next','Next',c('next')],['later','Later',c('later')],['done','Shipped',c('done')],
    ['','Total',ITEMS.length]
  ];
  $('#stats').innerHTML = cards.map(([cls,l,n])=>
    `<div class="stat ${cls}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}

// ---- card ----
function cardHTML(i){
  const pr = i.priority!=='done' ? `<span class="badge p-${i.priority}">${i.priority}</span>` : '';
  const dt = i.date ? `<span class="badge dt">${esc(i.date)}</span>` : '';
  const br = i.branch ? `<span class="badge branch">${esc(i.branch)}</span>` : '';
  return `<div class="card s-${STATUS_META[i.status].cls}" data-id="${i.id}">
    <div class="ct">${esc(i.title)}</div>
    <div class="cmeta"><span class="badge cat">${esc(i.category)}</span>${pr}${dt}</div>
    ${i.desc?`<div class="desc">${esc(i.desc)}</div>`:''}
    ${br?`<div class="cmeta">${br}</div>`:''}
  </div>`;
}

function wireCards(root){
  root.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>{
    openDetail(ITEMS.find(i=>i.id===el.dataset.id));
  }));
}

function openDetail(i){
  if(!i) return;
  $('#dTitle').textContent = i.title;
  const rows = [];
  rows.push(['Status', STATUS_META[i.status].label]);
  rows.push(['Category', i.category]);
  if(i.priority!=='done') rows.push(['Priority', i.priority]);
  if(i.date) rows.push(['Shipped', i.date]);
  if(i.branch) rows.push(['Branch', i.branch]);
  if(i.scope) rows.push(['Scope', i.scope]);
  let html = rows.map(([l,v])=>`<div class="row"><div class="lbl">${l}</div>${esc(v)}</div>`).join('');
  if(i.desc) html += `<div class="row"><div class="lbl">Details</div>${esc(i.desc)}</div>`;
  $('#dBody').innerHTML = html;
  $('#detail').showModal();
}

// ================= VIEWS =================
function render(){
  const data = filtered();
  $('#count').textContent = `${data.length} item${data.length===1?'':'s'} shown` +
    (state.q||state.cat!=='all'||state.prio!=='all'||state.status!=='all' ? ' (filtered)' : '');
  const v = $('#view');
  ({board:vBoard,timeline:vTimeline,category:vCategory,priority:vPriority,map:vMap,table:vTable,dashboard:vDashboard}[state.view])(v,data);
  wireCards(v);
}

// ---- Board (by status) ----
function vBoard(root,data){
  const cols = [['now','Now'],['next','Next'],['later','Later'],['done','Shipped']];
  const CAP = 40;
  root.innerHTML = `<div class="board">` + cols.map(([k,label])=>{
    let list = data.filter(i=>i.status===k);
    if(k==='done'){ list = list.slice().sort((a,b)=>b.date.localeCompare(a.date)); }
    const shown = (k==='done' && !state.expandDone) ? list.slice(0,CAP) : list;
    const meta = STATUS_META[k];
    const body = shown.length ? shown.map(cardHTML).join('')
      : `<div class="empty">${k==='now'?'Nothing critical open — clear runway.':'Nothing here.'}</div>`;
    const more = (k==='done' && list.length>CAP && !state.expandDone)
      ? `<div class="more" data-more="1">+ ${list.length-CAP} more shipped…</div>` : '';
    return `<div class="col c-${k}"><h3><span class="dot"></span>${label}<span class="k">${list.length}</span></h3>
      <div class="stack">${body}${more}</div></div>`;
  }).join('') + `</div>`;
  const m = root.querySelector('[data-more]');
  if(m) m.addEventListener('click',()=>{state.expandDone=true;render();});
}

// ---- Timeline (by time) ----
function vTimeline(root,data){
  const withDate = data.filter(i=>i.date).sort((a,b)=>b.date.localeCompare(a.date));
  const planned = data.filter(i=>!i.date);
  const byDay = {};
  withDate.forEach(i=>{(byDay[i.date]=byDay[i.date]||[]).push(i);});
  const days = Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  let html = `<div class="timeline">`;
  if(planned.length){
    html += `<div class="tl-day"><div class="d">Planned / unscheduled <span class="k">${planned.length} open</span></div>
      <div class="stack">${planned.map(cardHTML).join('')}</div></div>`;
  }
  html += days.map(d=>{
    const list = byDay[d];
    const dd = new Date(d+'T00:00:00');
    const nice = dd.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
    return `<div class="tl-day"><div class="d">${nice} <span class="k">${esc(d)} · ${list.length} shipped</span></div>
      <div class="stack">${list.map(cardHTML).join('')}</div></div>`;
  }).join('');
  html += `</div>`;
  if(!withDate.length && !planned.length) html = emptyMsg();
  root.innerHTML = html;
}

// ---- Category ----
function vCategory(root,data){
  const groups = {};
  data.forEach(i=>{(groups[i.category]=groups[i.category]||[]).push(i);});
  const keys = Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
  root.innerHTML = keys.length ? `<div class="groups">` + keys.map(c=>{
    const list = groups[c].slice().sort(sortItems);
    return `<div class="grp"><h3><span class="badge cat">${esc(c)}</span><span class="k">${list.length}</span></h3>
      <div class="grid">${list.map(cardHTML).join('')}</div></div>`;
  }).join('') + `</div>` : emptyMsg();
}

// ---- Priority ----
function vPriority(root,data){
  const lanes = [['high','High priority'],['medium','Medium priority'],['low','Low priority'],['done','Completed']];
  const groups = {high:[],medium:[],low:[],done:[]};
  data.forEach(i=>groups[i.priority]?.push(i));
  const parts = lanes.filter(([k])=>groups[k].length).map(([k,label])=>{
    let list = groups[k];
    if(k==='done') list = list.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,60);
    else list = list.slice().sort(sortItems);
    const badge = k==='done' ? `<span class="badge cat">Shipped</span>` : `<span class="badge p-${k}">${k}</span>`;
    const note = (k==='done' && groups.done.length>60) ? ` <span style="font-weight:400;color:var(--ink2);font-size:12px">(latest 60 of ${groups.done.length})</span>`:'';
    return `<div class="grp"><h3>${badge}${label}${note}<span class="k">${groups[k].length}</span></h3>
      <div class="grid">${list.map(cardHTML).join('')}</div></div>`;
  });
  root.innerHTML = parts.length ? `<div class="groups">`+parts.join('')+`</div>` : emptyMsg();
}

// ---- Table ----
let tblSort = {key:'date',dir:-1};
function vTable(root,data){
  const cols = [['title','Task'],['category','Category'],['status','Status'],['priority','Priority'],['date','Shipped'],['branch','Branch']];
  const rows = data.slice().sort((a,b)=>{
    let x=a[tblSort.key]||'', y=b[tblSort.key]||'';
    if(tblSort.key==='priority'){x=PRIO_ORDER[a.priority];y=PRIO_ORDER[b.priority];}
    return (x<y?-1:x>y?1:0)*tblSort.dir;
  });
  root.innerHTML = `<div class="tblwrap"><table><thead><tr>${
    cols.map(([k,l])=>`<th data-k="${k}">${l}${tblSort.key===k?(tblSort.dir<0?' ▾':' ▴'):''}</th>`).join('')
  }</tr></thead><tbody>${
    rows.map(i=>`<tr class="card" data-id="${i.id}" style="cursor:pointer">
      <td>${esc(i.title)}</td>
      <td><span class="badge cat">${esc(i.category)}</span></td>
      <td>${STATUS_META[i.status].label}</td>
      <td>${i.priority==='done'?'—':`<span class="badge p-${i.priority}">${i.priority}</span>`}</td>
      <td class="branch">${esc(i.date||'—')}</td>
      <td class="branch">${esc(i.branch||'—')}</td>
    </tr>`).join('')
  }</tbody></table></div>`;
  root.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.k;
    if(tblSort.key===k) tblSort.dir*=-1; else {tblSort.key=k;tblSort.dir=1;}
    render();
  }));
}

// ---- Dashboard ----
function vDashboard(root,data){
  // by category
  const catCount={}; data.forEach(i=>catCount[i.category]=(catCount[i.category]||0)+1);
  const catKeys=Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]);
  const catMax=Math.max(1,...catKeys.map(k=>catCount[k]));
  const catBars=catKeys.map(k=>`<div class="bar-row"><span>${esc(k)}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${catCount[k]/catMax*100}%"></div></div>
    <span class="v">${catCount[k]}</span></div>`).join('');

  // status breakdown
  const stCount={now:0,next:0,later:0,done:0}; data.forEach(i=>stCount[i.status]++);
  const stTot=data.length||1;
  const stBars=[['now','Now'],['next','Next'],['later','Later'],['done','Shipped']].map(([k,l])=>{
    const col=`var(--${k})`;
    return `<div class="bar-row"><span>${l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${stCount[k]/stTot*100}%;background:${col}"></div></div>
      <span class="v">${stCount[k]}</span></div>`;}).join('');

  // activity over time (done per day)
  const byDay={}; data.filter(i=>i.date).forEach(i=>byDay[i.date]=(byDay[i.date]||0)+1);
  const days=Object.keys(byDay).sort();
  const dMax=Math.max(1,...days.map(d=>byDay[d]));
  const bars=days.map(d=>`<div class="b" style="height:${byDay[d]/dMax*100}%" data-t="${esc(d)}: ${byDay[d]}"></div>`).join('');
  const xlabels=days.map(d=>`<span>${d.slice(8)}</span>`).join('');
  const spark = days.length
    ? `<div class="spark">${bars}</div><div class="spark-x">${xlabels}</div>
       <div style="font-size:11.5px;color:var(--ink2);margin-top:8px">Shipped items per day (${days[0]} → ${days[days.length-1]})</div>`
    : `<div class="empty" style="color:var(--ink2)">No dated items in the current filter.</div>`;

  // priority mix (open only)
  const pr={high:0,medium:0,low:0}; data.filter(i=>i.status!=='done').forEach(i=>pr[i.priority]!==undefined&&pr[i.priority]++);
  const prTot=(pr.high+pr.medium+pr.low)||1;
  const prBars=[['high','High'],['medium','Medium'],['low','Low']].map(([k,l])=>
    `<div class="bar-row"><span>${l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pr[k]/prTot*100}%;background:var(--${k})"></div></div>
      <span class="v">${pr[k]}</span></div>`).join('');

  root.innerHTML = `<div class="dash">
    <div class="panel full"><h3>Delivery cadence</h3>${spark}</div>
    <div class="panel"><h3>By category</h3>${catBars||'<div class="empty">—</div>'}</div>
    <div class="panel"><h3>Status breakdown</h3>${stBars}</div>
    <div class="panel"><h3>Open work by priority</h3>${prTot>1||pr.high+pr.medium+pr.low>0?prBars:'<div class="empty" style="color:var(--ink2)">No open items in filter.</div>'}</div>
    <div class="panel"><h3>At a glance</h3>
      <div class="bar-row" style="grid-template-columns:1fr auto"><span>Shipped items</span><span class="v">${stCount.done}</span></div>
      <div class="bar-row" style="grid-template-columns:1fr auto"><span>Open items</span><span class="v">${stCount.now+stCount.next+stCount.later}</span></div>
      <div class="bar-row" style="grid-template-columns:1fr auto"><span>Active days</span><span class="v">${days.length}</span></div>
      <div class="bar-row" style="grid-template-columns:1fr auto"><span>Categories</span><span class="v">${catKeys.length}</span></div>
      <div class="bar-row" style="grid-template-columns:1fr auto"><span>Busiest day</span><span class="v">${days.length?days.reduce((a,b)=>byDay[b]>byDay[a]?b:a):'—'}</span></div>
    </div>
  </div>`;
}

// ---- Map (radial mind-map by category) ----
function vMap(root,data){
  const W=1000,H=680,cx=W/2,cy=H/2;
  const groups={}; data.forEach(i=>{(groups[i.category]=groups[i.category]||[]).push(i);});
  const cats=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
  const palette=['#b5761f','#c0392b','#5b8a72','#4a6fa5','#8e5aa5','#c8892a','#7a8a4f','#a5674a','#4a8a8a','#a54a6f'];
  const catColor={}; cats.forEach((c,i)=>catColor[c]=palette[i%palette.length]);
  const R1=150; // category ring radius
  let svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Roadmap map">`;
  let nodes='', edges='';
  const n=cats.length;
  cats.forEach((c,ci)=>{
    const ang=(ci/n)*Math.PI*2 - Math.PI/2;
    const px=cx+Math.cos(ang)*R1, py=cy+Math.sin(ang)*R1;
    edges+=`<line x1="${cx}" y1="${cy}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="${catColor[c]}" stroke-width="2" opacity=".45"/>`;
    // leaf items around the category node
    const list=groups[c];
    const openN=list.filter(i=>i.status!=='done').length;
    const leafR=Math.min(78, 30+list.length*1.6);
    const maxLeaf=Math.min(list.length,18);
    list.slice(0,maxLeaf).forEach((it,li)=>{
      const la=ang + (li-(maxLeaf-1)/2)*0.16;
      const lr=R1+64+ (li%2)*20;
      const lx=cx+Math.cos(la)*lr, ly=cy+Math.sin(la)*lr;
      const open=it.status!=='done';
      edges+=`<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${lx.toFixed(1)}" y2="${ly.toFixed(1)}" stroke="${catColor[c]}" stroke-width="1" opacity=".2"/>`;
      nodes+=`<circle class="mnode" data-id="${it.id}" cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="${open?6:4}"
        fill="${open?catColor[c]:'var(--panel)'}" stroke="${catColor[c]}" stroke-width="${open?2:1.5}"
        style="cursor:pointer"><title>${esc(it.title)}${open?' ['+it.status+']':' [shipped]'}</title></circle>`;
    });
    // category bubble
    const rad=18+Math.min(20,list.length*0.5);
    nodes+=`<g><circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${rad}" fill="${catColor[c]}" opacity=".16" stroke="${catColor[c]}" stroke-width="2"/>
      <text x="${px.toFixed(1)}" y="${(py-2).toFixed(1)}" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--ink)">${esc(c)}</text>
      <text x="${px.toFixed(1)}" y="${(py+13).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--ink2)">${openN?openN+' open · ':''}${list.length}</text></g>`;
  });
  // center
  nodes+=`<circle cx="${cx}" cy="${cy}" r="46" fill="var(--accent)" opacity=".18" stroke="var(--accent)" stroke-width="2.5"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="15" font-weight="800" fill="var(--ink)">PACT</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="10.5" fill="var(--ink2)">${data.length} items</text>`;
  svg+=edges+nodes+`</svg>`;
  root.innerHTML=`<div class="mapwrap">${svg}
    <div class="map-legend">
      <div class="li"><span class="sw" style="background:var(--ink);opacity:.7"></span>Filled = open · hollow = shipped</div>
      ${cats.slice(0,10).map(c=>`<div class="li"><span class="sw" style="background:${catColor[c]}"></span>${esc(c)}</div>`).join('')}
    </div></div>`;
  root.querySelectorAll('.mnode').forEach(el=>el.addEventListener('click',()=>openDetail(ITEMS.find(i=>i.id===el.dataset.id))));
}

function sortItems(a,b){
  const pa=PRIO_ORDER[a.priority], pb=PRIO_ORDER[b.priority];
  if(pa!==pb) return pa-pb;
  return (b.date||'').localeCompare(a.date||'');
}
function emptyMsg(){return `<div class="panel" style="text-align:center;color:var(--ink2)">No items match the current filters.</div>`;}

init();
</script>
</body>
</html>
